name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/
      - name: Type check
        run: mypy src/sessionfs/ --ignore-missing-imports

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip audit
        run: pip-audit --desc --fix --dry-run
        continue-on-error: true  # Don't block CI on known unfixed CVEs

  migrations-postgres:
    name: Migrations (real PostgreSQL)
    runs-on: ubuntu-latest
    # Runs the full alembic chain from an empty DB on REAL PostgreSQL.
    # The unit test suite runs on SQLite, which cannot exercise PG-only
    # behaviour (constraint-vs-index semantics, asyncpg type binding,
    # USING GIN). A from-scratch `alembic upgrade head` on PG catches the
    # two prod migrate-job failure classes seen on the v0.13.0 SSO release:
    #   1. dialect divergence (DROP INDEX of a PG CONSTRAINT -> asyncpg
    #      DependentObjectsStillExistError; passed on SQLite where the same
    #      key is a plain index),
    #   2. object-already-exists (re-creating a constraint an earlier
    #      migration already created -> DuplicateTableError; passed on a
    #      minimal SQLite fixture table that omitted the earlier constraint).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sfs_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run alembic upgrade head on fresh PostgreSQL
        env:
          SFS_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/sfs_ci
        run: |
          alembic upgrade head
          # Assert we actually reached the head revision (a no-op chain
          # would otherwise pass silently).
          alembic current | grep -q '(head)'

  build:
    runs-on: ubuntu-latest
    needs: [test, lint, migrations-postgres]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Verify package
        run: |
          pip install dist/sessionfs-*.whl
          sfs --help
          sfsd --help
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
