  #       env:
  #         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  #         PR_NUMBER: ${{ github.event.pull_request.number }}
  #       run: |
  #         # Treat findings.json as untrusted data: validate shape
  #         # before formatting (same `jq -e 'type == "array" and
  #         # all(.[]; type == "object")'` guard as the review job).
