  #              artifacts/findings.json >/dev/null 2>&1; then
  #           echo "findings.json malformed; not posting PR comment."
  #           exit 0
  #         fi
  #         # Build the comment body from validated JSON, never from
  #         # PR-author-controlled scripts. Use jq to escape values.
